spring.datasource.url=jdbc:mysql://localhost:3306/pescd
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.upload.dir=uploads

# JWT - em producao, sobrescrever via variavel de ambiente JWT_SECRET (nunca commitar o valor real)
jwt.secret=${JWT_SECRET:minhaChaveSecretaSuperSeguraParaAssinarTokensJWT1234567890}
jwt.expiracao-ms=36000000
