<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ofertas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <h1 class="h3 mb-4">Ofertas PESCD</h1>

    <!-- V.01 RN-1: lista ordenada por semestre decrescente -->
    <table class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>Nome da Oferta</th>
            <th>Semestre</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Professor Responsável</th>
            <th>Alunos Matriculados</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="oferta : ${ofertas}">
            <td th:text="${oferta.nome}"></td>
            <td th:text="${oferta.semestre}"></td>
            <td th:text="${oferta.dataInicio}"></td>
            <td th:text="${oferta.dataFim}"></td>
            <td th:text="${oferta.professorResponsavel.nomeCompleto}"></td>
            <td th:text="${ofertaService.contarAlunos(oferta)}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(ofertas)}">
            <td colspan="6" class="text-center text-muted">Nenhuma oferta cadastrada.</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
