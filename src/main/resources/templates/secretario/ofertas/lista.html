<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ofertas')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Ofertas</h1>
        <a th:href="@{/secretario/ofertas/nova}" class="btn btn-primary">Nova Oferta</a>
    </div>

    <div th:replace="~{fragments/layout :: alertas}"></div>

    <!-- S.03 - Lista todas as ofertas com situação -->
    <table class="table table-bordered table-hover">
        <thead class="table-primary">
        <tr>
            <th>Nome</th>
            <th>Semestre</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Professor</th>
            <th>Alunos</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="o : ${ofertas}">
            <td th:text="${o.nome}"></td>
            <td th:text="${o.semestre}"></td>
            <td th:text="${o.dataInicio}"></td>
            <td th:text="${o.dataFim}"></td>
            <td th:text="${o.professorResponsavel.nomeCompleto}"></td>
            <td th:text="${ofertaService.contarAlunos(o)}"></td>
            <td>
                <span th:text="${o.statusExibicao}"
                      th:classappend="${o.statusExibicao == 'Em andamento'} ? 'badge bg-success' :
                                      (${o.statusExibicao == 'Concluída'} ? 'badge bg-secondary' :
                                      (${o.statusExibicao == 'Em atraso'} ? 'badge bg-danger' : 'badge bg-warning text-dark'))">
                </span>
            </td>
            <td>
                <a th:href="@{/secretario/ofertas/{id}(id=${o.id})}"
                   class="btn btn-sm btn-outline-primary">Detalhes</a>
                <a th:href="@{/secretario/ofertas/{id}/alunos(id=${o.id})}"
                   class="btn btn-sm btn-outline-secondary">Alunos</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(ofertas)}">
            <td colspan="8" class="text-center text-muted">Nenhuma oferta cadastrada.</td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
