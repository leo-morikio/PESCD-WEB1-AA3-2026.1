<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PESCD - Aprovar Plano</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/professor/ofertas}">PESCD</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/professor/supervisor/ofertas}">Supervisor</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/professor/responsavel/ofertas}">Responsável</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light ms-2" th:href="@{/logout}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Aprovar Plano de Trabalho</h1>

    <div class="card mb-4">
        <div class="card-header"><strong>Dados do Aluno</strong></div>
        <div class="card-body">
            <p><strong>Nome:</strong> <span th:text="${inscricao.aluno.nomeCompleto}"></span></p>
            <p><strong>Oferta:</strong> <span th:text="${inscricao.oferta.nome}"></span></p>
            <p><strong>Semestre:</strong> <span th:text="${inscricao.oferta.semestre}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header"><strong>Dados do Plano</strong></div>
        <div class="card-body">
            <div th:if="${plano != null}">
                <p><strong>Código da Disciplina:</strong> <span th:text="${plano.codigoDisciplina}"></span></p>
                <p><strong>Nome da Disciplina:</strong> <span th:text="${plano.nomeDisciplina}"></span></p>
                <p><strong>Curso:</strong> <span th:text="${plano.curso}"></span></p>
            </div>
            <div th:if="${plano == null}">
                <p class="text-muted">Nenhum plano enviado ainda.</p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><strong>Parecer</strong></div>
        <div class="card-body">
            <form th:action="@{/professor/supervisor/aprovar-plano/{id}(id=${inscricao.id})}"
                  method="post">
                <div class="mb-3">
                    <label for="parecer" class="form-label">Parecer</label>
                    <textarea id="parecer" name="parecer" class="form-control"
                              rows="4" required></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Aprovar</button>
                    <a th:href="@{/professor/supervisor/ofertas}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
