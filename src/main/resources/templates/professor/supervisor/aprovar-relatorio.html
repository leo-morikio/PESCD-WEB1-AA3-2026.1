<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PESCD - Aprovar Relatório</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">

    <h1 class="mb-4">Aprovar Relatório Final</h1>

    <div class="card mb-4">
        <div class="card-header"><strong>Dados do Aluno</strong></div>
        <div class="card-body">
            <p><strong>Nome:</strong> <span th:text="${inscricao.aluno.nomeCompleto}"></span></p>
            <p><strong>Oferta:</strong> <span th:text="${inscricao.oferta.nome}"></span></p>
            <p><strong>Semestre:</strong> <span th:text="${inscricao.oferta.semestre}"></span></p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header"><strong>Dados do Plano</strong></div>
        <div class="card-body">
            <div th:if="${plano != null}">
                <p><strong>Código:</strong> <span th:text="${plano.codigoDisciplina}"></span></p>
                <p><strong>Disciplina:</strong> <span th:text="${plano.nomeDisciplina}"></span></p>
                <p><strong>Curso:</strong> <span th:text="${plano.curso}"></span></p>
            </div>
            <p th:if="${plano == null}" class="text-muted">Nenhum plano registrado.</p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header"><strong>Dados do Relatório</strong></div>
        <div class="card-body">
            <div th:if="${relatorio != null}">
                <p><strong>Indicador de Frequência:</strong>
                    <span th:text="${relatorio.indicadorFrequencia}"></span>%
                </p>
            </div>
            <p th:if="${relatorio == null}" class="text-muted">Nenhum relatório enviado ainda.</p>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><strong>Parecer do Supervisor</strong></div>
        <div class="card-body">
            <form th:action="@{/professor/supervisor/aprovar-relatorio/{id}(id=${inscricao.id})}"
                  method="post">
                <div class="mb-3">
                    <label for="parecer" class="form-label">Parecer</label>
                    <textarea id="parecer" name="parecer" class="form-control" rows="4" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="indicadorFrequencia" class="form-label">Frequência (%)</label>
                    <input type="number" id="indicadorFrequencia" name="indicadorFrequencia"
                           class="form-control" min="0" max="100" required
                           th:value="${relatorio != null ? relatorio.indicadorFrequencia : ''}"/>
                </div>
                <div class="mb-3">
                    <label for="sugestaoNota" class="form-label">Sugestão de Nota</label>
                    <select id="sugestaoNota" name="sugestaoNota" class="form-select" required>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">Aprovar</button>
                    <a th:href="@{/professor/supervisor/ofertas}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
