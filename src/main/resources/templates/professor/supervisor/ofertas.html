<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PESCD - Minhas Supervisões</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/professor/ofertas}">PESCD</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/professor/supervisor/ofertas}">Supervisor</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/professor/responsavel/ofertas}">Responsável</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-outline-light ms-2" th:href="@{/logout}">Sair</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Minhas Supervisões</h1>

    <div th:if="${inscricoes.isEmpty()}" class="alert alert-info">
        Você não possui alunos sob sua supervisão no momento.
    </div>

    <div th:if="${!inscricoes.isEmpty()}">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>Aluno</th>
                <th>Oferta</th>
                <th>Semestre</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="inscricao : ${inscricoes}">
                <td th:text="${inscricao.aluno.nomeCompleto}"></td>
                <td th:text="${inscricao.oferta.nome}"></td>
                <td th:text="${inscricao.oferta.semestre}"></td>
                <td th:text="${inscricao.status}"></td>
                <td>
                    <a th:if="${inscricao.status.name() == 'PLANO_ENVIADO'}"
                       th:href="@{/professor/supervisor/aprovar-plano/{id}(id=${inscricao.id})}"
                       class="btn btn-primary btn-sm">
                        Aprovar Plano
                    </a>
                    <a th:if="${inscricao.status.name() == 'RELATORIO_ENVIADO'}"
                       th:href="@{/professor/supervisor/aprovar-relatorio/{id}(id=${inscricao.id})}"
                       class="btn btn-warning btn-sm">
                        Aprovar Relatório
                    </a>
                    <span th:if="${inscricao.status.name() != 'PLANO_ENVIADO'
                                   and inscricao.status.name() != 'RELATORIO_ENVIADO'}"
                          class="text-muted">
                            Sem ações pendentes
                        </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
