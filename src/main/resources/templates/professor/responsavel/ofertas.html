<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PESCD - Professor Responsável</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/professor/ofertas}">PESCD</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/professor/supervisor/ofertas}">Supervisor</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/professor/responsavel/ofertas}">Responsável</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light ms-2">Sair</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="mb-4">Minhas Ofertas</h1>

    <div th:if="${ofertas.isEmpty()}" class="alert alert-info">
        Você não é responsável por nenhuma oferta no momento.
    </div>

    <div th:each="oferta : ${ofertas}" class="card mb-4 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong th:text="${oferta.nome}"></strong>
            <span class="badge bg-secondary" th:text="${oferta.statusExibicao}"></span>
        </div>
        <div class="card-body">
            <p><strong>Semestre:</strong> <span th:text="${oferta.semestre}"></span></p>

            <table class="table table-bordered table-hover mb-3">
                <thead class="table-dark">
                <tr>
                    <th>Aluno</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inscricao : ${inscricoesPorOferta[oferta.id]}">
                    <td th:text="${inscricao.aluno.nomeCompleto}"></td>
                    <td th:text="${inscricao.statusExibicao}"></td>
                    <td>
                        <a th:if="${inscricao.status.name() == 'RELATORIO_APROVADO_SUPERVISOR'}"
                           th:href="@{/professor/responsavel/concluir-relatorio/{id}(id=${inscricao.id})}"
                           class="btn btn-success btn-sm">
                            Aprovar Relatório
                        </a>
                        <a th:if="${inscricao.status.name() == 'DOCUMENTACAO_ENVIADA'}"
                           th:href="@{/professor/responsavel/analisar-documentacao/{id}(id=${inscricao.id})}"
                           class="btn btn-info btn-sm">
                            Analisar Documentação
                        </a>
                        <span th:if="${inscricao.status.name() != 'RELATORIO_APROVADO_SUPERVISOR'
                                       and inscricao.status.name() != 'DOCUMENTACAO_ENVIADA'}"
                              class="text-muted">
                                Sem ações pendentes
                            </span>
                    </td>
                </tr>
                </tbody>
            </table>

            <form th:if="${oferta.status.name() == 'ATIVA'}"
                  th:action="@{/professor/responsavel/encerrar-oferta/{id}(id=${oferta.id})}"
                  method="post">
                <div class="mb-3">
                    <label for="licoesAprendidas" class="form-label">Lições Aprendidas</label>
                    <textarea id="licoesAprendidas" name="licoesAprendidas"
                              class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-danger">Encerrar Oferta</button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
