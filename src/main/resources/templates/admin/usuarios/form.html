<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Usuário')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container" style="max-width:600px">
    <h1 class="h3 mb-4" th:text="${usuario.id == null ? 'Novo Usuário' : 'Editar Usuário'}">Usuário</h1>
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <!-- AD.01 RN-2: campos obrigatórios -->
    <form th:action="${usuario.id == null ? '/admin/usuarios/salvar' : '/admin/usuarios/atualizar'}"
          method="post">
        <input type="hidden" th:field="*{usuario.id}" />

        <div class="mb-3">
            <label class="form-label">Nome Completo *</label>
            <input type="text" th:field="*{usuario.nomeCompleto}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">E-mail *</label>
            <input type="email" th:field="*{usuario.email}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Nome de Usuário *</label>
            <input type="text" th:field="*{usuario.nomeUsuario}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Senha *</label>
            <input type="password" th:field="*{usuario.senha}" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Perfil *</label>
            <select th:field="*{usuario.perfil}" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="p : ${perfis}" th:value="${p}" th:text="${p}"></option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"
                    th:text="${usuario.id == null ? 'Cadastrar' : 'Atualizar'}">Salvar</button>
            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
