<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enviar Plano de Trabalho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">PESCD</span>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h1 class="mb-4">Enviar Plano de Trabalho</h1>

    <form th:action="@{/aluno/plano/enviar/{id}(id=${inscricaoId})}"
          th:object="${plano}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Professor Supervisor *</label>
            <select name="supervisorId" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="p : ${professores}"
                        th:value="${p.id}"
                        th:text="${p.nomeCompleto}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Código da disciplina:</label>
            <input type="text" class="form-control" th:field="*{codigoDisciplina}">
        </div>
        <div class="mb-3">
            <label class="form-label">Nome da disciplina:</label>
            <input type="text" class="form-control" th:field="*{nomeDisciplina}">
        </div>
        <div class="mb-3">
            <label class="form-label">Curso da disciplina:</label>
            <input type="text" class="form-control" th:field="*{curso}">
        </div>

        <button type="submit" class="btn btn-primary">Enviar Plano</button>
        <a class="btn btn-outline-secondary" th:href="@{/aluno/ofertas}">← Voltar</a>

    </form>
</div>

</body>
</html>
