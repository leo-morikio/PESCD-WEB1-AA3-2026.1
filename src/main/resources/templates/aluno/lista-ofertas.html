<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minhas Ofertas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">PESCD</span>
    <form th:action="@{/logout}" method="post" class="m-0">
        <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
    </form>
</nav>

<div class="container mt-4">
    <h1 class="mb-4">Minhas Ofertas</h1>

    <table class="table table-striped table-bordered align-middle">
        <thead class="table-light">
        <tr>
            <th>Oferta</th>
            <th>Semestre</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Professor Responsável</th>
            <th>Status da Oferta</th>
            <th>Meu Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="inscricao : ${inscricoes}">
            <td th:text="${inscricao.oferta.nome}"></td>
            <td th:text="${inscricao.oferta.semestre}"></td>
            <td th:text="${inscricao.oferta.dataInicio}"></td>
            <td th:text="${inscricao.oferta.dataFim}"></td>
            <td th:text="${inscricao.oferta.professorResponsavel.nomeCompleto}"></td>
            <td th:text="${inscricao.oferta.statusExibicao}"></td>
            <td th:text="${inscricao.status}"></td>
            <td>
                <a class="btn btn-primary btn-sm" th:href="@{/aluno/plano/novo/{id}(id=${inscricao.id})}">Enviar Plano</a>
                <a class="btn btn-secondary btn-sm" th:href="@{/aluno/documentacao/novo/{id}(id=${inscricao.id})}">Enviar Documentação</a>
                <a class="btn btn-success btn-sm" th:href="@{/aluno/relatorio/novo/{id}(id=${inscricao.id})}">Enviar Relatório</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
