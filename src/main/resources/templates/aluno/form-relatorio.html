<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enviar Relatório Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">PESCD</span>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h1 class="mb-4">Enviar Relatório Final do Estágio</h1>

    <form th:action="@{/aluno/relatorio/enviar/{id}(id=${inscricaoId})}"
          th:object="${relatorio}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Indicador de frequência (0 a 100%):</label>
            <input type="number" class="form-control" th:field="*{indicadorFrequencia}" min="0" max="100">
        </div>

        <button type="submit" class="btn btn-success">Enviar Relatório</button>
        <a class="btn btn-outline-secondary" th:href="@{/aluno/ofertas}">← Voltar</a>

    </form>
</div>

</body>
</html>
