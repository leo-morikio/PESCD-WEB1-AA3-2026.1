<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Enviar Documentação de Ensino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary px-4">
    <span class="navbar-brand">PESCD</span>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h1 class="mb-4">Enviar Documentação de Ensino</h1>

    <form th:action="@{/aluno/documentacao/enviar/{id}(id=${inscricaoId})}"
          th:object="${documentacao}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Nome da instituição:</label>
            <input type="text" class="form-control" th:field="*{nomeInstituicao}">
        </div>
        <div class="mb-3">
            <label class="form-label">Nome da disciplina:</label>
            <input type="text" class="form-control" th:field="*{nomeDisciplina}">
        </div>
        <div class="mb-3">
            <label class="form-label">Curso da disciplina:</label>
            <input type="text" class="form-control" th:field="*{curso}">
        </div>
        <div class="mb-3">
            <label class="form-label">Carga horária (horas):</label>
            <input type="number" class="form-control" th:field="*{cargaHoraria}">
        </div>

        <button type="submit" class="btn btn-success">Enviar Documentação</button>
        <a class="btn btn-outline-secondary" th:href="@{/aluno/ofertas}">← Voltar</a>

    </form>
</div>

</body>
</html>
