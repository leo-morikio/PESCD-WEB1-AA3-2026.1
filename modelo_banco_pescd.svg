<svg viewBox="0 0 870 780" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="12">
  <title>Diagrama do Modelo de Banco de Dados - PESCD</title>
  <desc>Entidades do sistema PESCD e seus relacionamentos — inclui ConfiguracaoSistema e campos de auditoria em Oferta</desc>

  <!-- Background -->
  <rect width="860" height="770" fill="#f8f8f8"/>

  <!-- Legend -->
  <rect x="20" y="16" width="820" height="32" rx="6" fill="#efefef"/>
  <circle cx="44" cy="32" r="7" fill="#6c63ff"/>
  <text x="58" y="36" fill="#222" font-size="11">Entidade principal</text>
  <rect x="160" y="25" width="14" height="14" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="180" y="36" fill="#222" font-size="11">Enum</text>
  <line x1="240" y1="32" x2="268" y2="32" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="274" y="36" fill="#222" font-size="11">OneToOne</text>
  <line x1="355" y1="32" x2="383" y2="32" stroke="#888" stroke-width="1.5"/>
  <text x="389" y="36" fill="#222" font-size="11">ManyToOne</text>
  <rect x="470" y="25" width="12" height="14" rx="2" fill="#6c63ff" opacity="0.45"/>
  <text x="488" y="36" fill="#222" font-size="11">Novo (Leo/Membro 2)</text>

  <!-- ============================================================ -->
  <!--  USUARIO  (unchanged)                                        -->
  <!-- ============================================================ -->
  <rect x="20" y="62" width="185" height="155" rx="8" fill="white" stroke="#6c63ff" stroke-width="2"/>
  <rect x="20" y="62" width="185" height="28" rx="8" fill="#6c63ff"/>
  <rect x="20" y="82"  width="185" height="8"  fill="#6c63ff"/>
  <text x="112" y="81" text-anchor="middle" fill="white" font-weight="bold" font-size="13">Usuario</text>
  <text x="32" y="108" fill="#555" font-size="10">🔑 id</text>
  <text x="32" y="124" fill="#222" font-size="10">nomeCompleto</text>
  <text x="32" y="139" fill="#222" font-size="10">email (unique)</text>
  <text x="32" y="154" fill="#222" font-size="10">nomeUsuario (unique)</text>
  <text x="32" y="169" fill="#222" font-size="10">senha</text>
  <text x="32" y="184" fill="#222" font-size="10">perfil → Perfil</text>
  <text x="32" y="207" fill="#999" font-size="9" font-style="italic">AD.01 RN-1 / S.02 RN-1</text>

  <!-- enum Perfil (unchanged) -->
  <rect x="20" y="240" width="185" height="90" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="20" y="240" width="185" height="24" rx="8" fill="#22c55e" opacity="0.8"/>
  <rect x="20" y="256" width="185" height="8"  fill="#22c55e" opacity="0.8"/>
  <text x="112" y="257" text-anchor="middle" fill="white" font-weight="bold" font-size="11">enum Perfil</text>
  <text x="32" y="278" fill="#222" font-size="10">ADMIN | SECRETARIO</text>
  <text x="32" y="293" fill="#222" font-size="10">PROFESSOR | ALUNO</text>
  <text x="32" y="318" fill="#999" font-size="9" font-style="italic">RNG-1: perfis do sistema</text>
  <!-- Usuario → Perfil -->
  <line x1="112" y1="217" x2="112" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!--  OFERTA  (expanded: +criadoPor/Em, +encerradoPor/Em, +licoes)-->
  <!--  y=62, h=250, ends y=312                                     -->
  <!-- ============================================================ -->
  <rect x="320" y="62"  width="200" height="250" rx="8" fill="white" stroke="#6c63ff" stroke-width="2"/>
  <rect x="320" y="62"  width="200" height="28"  rx="8" fill="#6c63ff"/>
  <rect x="320" y="82"  width="200" height="8"   fill="#6c63ff"/>
  <text x="420" y="81"  text-anchor="middle" fill="white" font-weight="bold" font-size="13">Oferta</text>
  <text x="332" y="108" fill="#555" font-size="10">🔑 id</text>
  <text x="332" y="124" fill="#222" font-size="10">nome</text>
  <text x="332" y="139" fill="#222" font-size="10">semestre</text>
  <text x="332" y="154" fill="#222" font-size="10">dataInicio / dataFim</text>
  <text x="332" y="169" fill="#222" font-size="10">status → StatusOferta</text>
  <text x="332" y="184" fill="#222" font-size="10">professorResponsavel → Usuario</text>
  <!-- new audit fields (highlighted) -->
  <rect x="322" y="191" width="196" height="78" rx="4" fill="#6c63ff" opacity="0.08"/>
  <text x="332" y="203" fill="#3b5bdb" font-size="10">criadoPor → Usuario (FK)</text>
  <text x="332" y="218" fill="#3b5bdb" font-size="10">criadoEm (LocalDateTime)</text>
  <text x="332" y="233" fill="#3b5bdb" font-size="10">encerradoPor → Usuario (nullable)</text>
  <text x="332" y="248" fill="#3b5bdb" font-size="10">encerradoEm (nullable)</text>
  <text x="332" y="263" fill="#3b5bdb" font-size="10">licoesAprendidas (TEXT)</text>
  <text x="332" y="282" fill="#999" font-size="9" font-style="italic">getStatusExibicao() calculado</text>
  <text x="332" y="299" fill="#999" font-size="9" font-style="italic">S.01 RN-1,2,3,4 / S.04 RN-1,2</text>

  <!-- enum StatusOferta — y=325, ends y=415 -->
  <rect x="320" y="325" width="200" height="90" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="320" y="325" width="200" height="24" rx="8" fill="#22c55e" opacity="0.8"/>
  <rect x="320" y="341" width="200" height="8"  fill="#22c55e" opacity="0.8"/>
  <text x="420" y="342" text-anchor="middle" fill="white" font-weight="bold" font-size="11">enum StatusOferta</text>
  <text x="332" y="363" fill="#222" font-size="10">ATIVA</text>
  <text x="332" y="378" fill="#222" font-size="10">AGUARDANDO_ENCERRAMENTO_SECRETARIO</text>
  <text x="332" y="393" fill="#222" font-size="10">CONCLUIDA</text>
  <text x="332" y="407" fill="#999" font-size="9" font-style="italic">S.03 RN-1 / S.04 RN-2</text>
  <!-- Oferta → StatusOferta -->
  <line x1="420" y1="312" x2="420" y2="325" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Usuario → Oferta (professorResponsavel) -->
  <line x1="205" y1="120" x2="320" y2="120" stroke="#888" stroke-width="1.5"/>
  <polygon points="316,116 320,120 316,124" fill="#888"/>

  <!-- ============================================================ -->
  <!--  INSCRICAO_OFERTA  — shifted to y=460, ends y=635           -->
  <!-- ============================================================ -->
  <rect x="320" y="460" width="200" height="175" rx="8" fill="white" stroke="#e07b39" stroke-width="2"/>
  <rect x="320" y="460" width="200" height="28"  rx="8" fill="#e07b39"/>
  <rect x="320" y="480" width="200" height="8"   fill="#e07b39"/>
  <text x="420" y="479" text-anchor="middle" fill="white" font-weight="bold" font-size="12">InscricaoOferta</text>
  <text x="332" y="506" fill="#555" font-size="10">🔑 id</text>
  <text x="332" y="521" fill="#222" font-size="10">aluno → Usuario (FK)</text>
  <text x="332" y="536" fill="#222" font-size="10">oferta → Oferta (FK)</text>
  <text x="332" y="551" fill="#222" font-size="10">professorSupervisor →</text>
  <text x="342" y="564" fill="#222" font-size="10">Usuario (FK, nullable)</text>
  <text x="332" y="579" fill="#222" font-size="10">status → StatusAluno</text>
  <text x="332" y="622" fill="#999" font-size="9" font-style="italic">S.02 RN-2: aluno em múltiplas ofertas</text>

  <!-- StatusOferta bottom → InscricaoOferta top -->
  <line x1="420" y1="415" x2="420" y2="460" stroke="#888" stroke-width="1.5"/>
  <polygon points="416,456 420,460 424,456" fill="#888"/>

  <!-- ============================================================ -->
  <!--  STATUS ALUNO enum — shifted to y=460, ends y=610           -->
  <!-- ============================================================ -->
  <rect x="580" y="460" width="260" height="150" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="580" y="460" width="260" height="24"  rx="8" fill="#22c55e" opacity="0.8"/>
  <rect x="580" y="476" width="260" height="8"   fill="#22c55e" opacity="0.8"/>
  <text x="710" y="477" text-anchor="middle" fill="white" font-weight="bold" font-size="11">enum StatusAluno</text>
  <text x="592" y="498" fill="#222" font-size="10">NAO_ENVIADO → PLANO_ENVIADO</text>
  <text x="592" y="513" fill="#222" font-size="10">→ PLANO_APROVADO</text>
  <text x="592" y="528" fill="#222" font-size="10">DOCUMENTACAO_ENVIADA</text>
  <text x="592" y="543" fill="#222" font-size="10">RELATORIO_ENVIADO</text>
  <text x="592" y="558" fill="#222" font-size="10">RELATORIO_APROVADO_SUPERVISOR</text>
  <text x="592" y="573" fill="#222" font-size="10">CONCLUIDO_RESPONSAVEL</text>
  <text x="592" y="598" fill="#999" font-size="9" font-style="italic">S.03 RN-2: 7 status do aluno</text>
  <!-- InscricaoOferta → StatusAluno -->
  <line x1="520" y1="579" x2="580" y2="579" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="576,575 580,579 576,583" fill="#22c55e"/>

  <!-- Usuario → InscricaoOferta (aluno) — L-shaped -->
  <line x1="112" y1="217" x2="112" y2="521" stroke="#888" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="112" y1="521" x2="320" y2="521" stroke="#888" stroke-width="1.5"/>
  <polygon points="316,517 320,521 316,525" fill="#888"/>

  <!-- ============================================================ -->
  <!--  PLANO TRABALHO  (unchanged)                                 -->
  <!-- ============================================================ -->
  <rect x="580" y="62"  width="260" height="145" rx="8" fill="white" stroke="#6c63ff" stroke-width="2"/>
  <rect x="580" y="62"  width="260" height="28"  rx="8" fill="#6c63ff"/>
  <rect x="580" y="82"  width="260" height="8"   fill="#6c63ff"/>
  <text x="710" y="81"  text-anchor="middle" fill="white" font-weight="bold" font-size="13">PlanoTrabalho</text>
  <text x="592" y="108" fill="#555" font-size="10">🔑 id</text>
  <text x="592" y="123" fill="#222" font-size="10">inscricao → InscricaoOferta (1:1)</text>
  <text x="592" y="138" fill="#222" font-size="10">codigoDisciplina / nomeDisciplina</text>
  <text x="592" y="153" fill="#222" font-size="10">curso / caminhoArquivo</text>
  <text x="592" y="195" fill="#999" font-size="9" font-style="italic">AL.02 RN-1: dados do plano</text>

  <!-- ============================================================ -->
  <!--  RELATORIO FINAL  (unchanged)                                -->
  <!-- ============================================================ -->
  <rect x="580" y="220" width="260" height="125" rx="8" fill="white" stroke="#6c63ff" stroke-width="2"/>
  <rect x="580" y="220" width="260" height="28"  rx="8" fill="#6c63ff"/>
  <rect x="580" y="240" width="260" height="8"   fill="#6c63ff"/>
  <text x="710" y="239" text-anchor="middle" fill="white" font-weight="bold" font-size="13">RelatorioFinal</text>
  <text x="592" y="265" fill="#555" font-size="10">🔑 id</text>
  <text x="592" y="280" fill="#222" font-size="10">inscricao → InscricaoOferta (1:1)</text>
  <text x="592" y="295" fill="#222" font-size="10">indicadorFrequencia</text>
  <text x="592" y="310" fill="#222" font-size="10">caminhoArquivo</text>
  <text x="592" y="336" fill="#999" font-size="9" font-style="italic">AL.04 RN-1: relatório do aluno</text>

  <!-- ============================================================ -->
  <!--  CONFIGURACAO SISTEMA  (NEW) — y=358, ends y=448            -->
  <!-- ============================================================ -->
  <rect x="580" y="358" width="260" height="90"  rx="8" fill="#f0f4ff" stroke="#6c63ff" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="580" y="358" width="260" height="28"  rx="8" fill="#6c63ff" opacity="0.75"/>
  <rect x="580" y="378" width="260" height="8"   fill="#6c63ff" opacity="0.75"/>
  <text x="710" y="377" text-anchor="middle" fill="white" font-weight="bold" font-size="12">ConfiguracaoSistema</text>
  <text x="592" y="403" fill="#555" font-size="10">🔑 id (sempre 1L — singleton)</text>
  <text x="592" y="419" fill="#3b5bdb" font-size="10">instrucaoEncerramento (TEXT)</text>
  <text x="592" y="441" fill="#999" font-size="9" font-style="italic">S.04 RN-3: instrução global de encerramento</text>

  <!-- ============================================================ -->
  <!--  LOG STATUS  — shifted to y=460, ends y=615                 -->
  <!-- ============================================================ -->
  <rect x="20" y="460"  width="270" height="155" rx="8" fill="white" stroke="#e07b39" stroke-width="2"/>
  <rect x="20" y="460"  width="270" height="28"  rx="8" fill="#e07b39"/>
  <rect x="20" y="480"  width="270" height="8"   fill="#e07b39"/>
  <text x="155" y="479" text-anchor="middle" fill="white" font-weight="bold" font-size="13">LogStatus</text>
  <text x="32" y="506"  fill="#555" font-size="10">🔑 id</text>
  <text x="32" y="521"  fill="#222" font-size="10">inscricao → InscricaoOferta (FK)</text>
  <text x="32" y="536"  fill="#222" font-size="10">statusAnterior / statusNovo</text>
  <text x="32" y="551"  fill="#222" font-size="10">dataHora (timestamp)</text>
  <text x="32" y="566"  fill="#222" font-size="10">usuarioResponsavel → Usuario</text>
  <text x="32" y="603"  fill="#999" font-size="9" font-style="italic">S.03 RN-3: logs de mudança de status</text>
  <!-- LogStatus → InscricaoOferta -->
  <line x1="290" y1="536" x2="320" y2="536" stroke="#888" stroke-width="1.5"/>
  <polygon points="316,532 320,536 316,540" fill="#888"/>

  <!-- ============================================================ -->
  <!--  DOCUMENTACAO ENSINO  — shifted to y=645, ends y=760        -->
  <!-- ============================================================ -->
  <rect x="20" y="645"  width="820" height="115" rx="8" fill="white" stroke="#6c63ff" stroke-width="2"/>
  <rect x="20" y="645"  width="820" height="28"  rx="8" fill="#6c63ff"/>
  <rect x="20" y="665"  width="820" height="8"   fill="#6c63ff"/>
  <text x="430" y="664" text-anchor="middle" fill="white" font-weight="bold" font-size="13">DocumentacaoEnsino</text>
  <text x="32"  y="689" fill="#555" font-size="10">🔑 id</text>
  <text x="100" y="689" fill="#222" font-size="10">inscricao → InscricaoOferta (1:1)</text>
  <text x="320" y="689" fill="#222" font-size="10">nomeInstituicao / nomeDisciplina</text>
  <text x="540" y="689" fill="#222" font-size="10">curso / cargaHoraria / caminhoArquivo</text>
  <text x="32"  y="732" fill="#999" font-size="9" font-style="italic">AL.03 RN-1: caminho alternativo ao estágio — aluno que já ministrou aulas no ensino superior</text>

  <!-- ============================================================ -->
  <!--  ARROWS / CONNECTIONS                                        -->
  <!-- ============================================================ -->

  <!-- InscricaoOferta → DocumentacaoEnsino (1:1, dashed) -->
  <line x1="420" y1="635" x2="420" y2="645" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="416,641 420,645 424,641" fill="#888"/>

  <!-- InscricaoOferta → PlanoTrabalho (1:1, dashed, routed via x=560) -->
  <line x1="520" y1="506" x2="560" y2="506" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="506" x2="560" y2="135" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="135" x2="580" y2="135" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="576,131 580,135 576,139" fill="#888"/>

  <!-- InscricaoOferta → RelatorioFinal (1:1, dashed, routed via x=548) -->
  <line x1="520" y1="521" x2="548" y2="521" stroke="#888" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="548" y1="521" x2="548" y2="284" stroke="#888" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="548" y1="284" x2="580" y2="284" stroke="#888" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <polygon points="576,280 580,284 576,288" fill="#888" opacity="0.7"/>
</svg>
